<!doctype html>
<html>
<head>
<title>Gemini AI Chat Panel</title>
</head>

<body>

<h2>Gemini AI Chat Panel</h2>

<div id="chat"></div>

<input id="msg" placeholder="Ask Gemini something..." />
<button onclick="send()">Send</button>

<script>

const API_KEY = "YOUR API";

let messages = JSON.parse(localStorage.getItem("chat")) || [];

const chatDiv = document.getElementById("chat");

function render() {
chatDiv.innerHTML = "";

messages.forEach((m) => {
const p = document.createElement("p");
p.textContent = m;
chatDiv.appendChild(p);
});
}

function save() {
localStorage.setItem("chat", JSON.stringify(messages.slice(-10)));
}

async function send() {

const input = document.getElementById("msg");
const userText = input.value;

if (!userText) return;

messages.push("User: " + userText);
render();

input.value = "";

const prompt =
"You are my father whose name is Bhagwati Prasad Khandelwa. You are a teacher by profession and very strict with rules. Now I will ask something and you must reply like this character. Do not send intro text. My message is: ";

try {

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
contents: [
{
parts: [{ text: prompt + userText }]
}
]
})
}
);

const data = await response.json();

let aiText = "Error getting response";

if (data.candidates && data.candidates.length > 0) {
aiText = data.candidates[0].content.parts[0].text;
}

messages.push("Gemini: " + aiText);

save();
render();

} catch (err) {

messages.push("Gemini: API error");
render();

}

}

render();

</script>

</body>
</html>
